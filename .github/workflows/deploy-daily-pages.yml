name: Deploy Report Viewer (GitHub Pages)

# Keep docs/ (legacy Pages: main branch, site root → docs/) in sync with OUTPUT.
#
# Pushes made with GITHUB_TOKEN do not trigger other *push* workflows, so
# daily-monitor / monthly-report rebuild docs themselves. This workflow is the
# safety net (workflow_run) plus coverage for human/local pushes to output/.
on:
  push:
    branches: [main]
    paths:
      - "output/daily/**"
      - "output/monthly/**"
      - "keywords.txt"
      - "sources.md"
      - ".github/workflows/deploy-daily-pages.yml"
      - "scripts/build_daily_pages.py"
      - "scripts/build_report_pages.py"
      - "index.html"
  workflow_run:
    workflows:
      - "Daily Tech Market Monitor"
      - "Monthly Tech Market Report"
    types: [completed]
  workflow_dispatch:

permissions:
  contents: write
  actions: read

concurrency:
  # Share with daily/monthly so docs commits do not race report pushes.
  group: repo-push
  cancel-in-progress: false

jobs:
  deploy:
    if: >-
      github.event_name != 'workflow_run' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Build static site from daily + monthly markdown
        run: |
          pip install markdown
          python scripts/build_report_pages.py

      - name: Commit docs/ viewer if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs index.html .nojekyll
          if git diff --staged --quiet; then
            echo "No docs/ changes to commit"
            exit 0
          fi
          git commit -m "pages: refresh daily/monthly output viewer"
          git fetch origin main
          git rebase origin/main
          git push origin HEAD:main
