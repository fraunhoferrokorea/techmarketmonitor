name: Deploy Daily Dashboard (GitHub Pages)

on:
  push:
    branches: [main]
    paths:
      - "output/daily/**"
      - ".github/workflows/deploy-daily-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: daily-pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload daily dashboard artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: output/daily

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
