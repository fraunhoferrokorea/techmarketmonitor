name: Deploy Report Viewer (GitHub Pages)

on:
  push:
    branches: [main]
    paths:
      - "output/daily/**"
      - "output/monthly/**"
      - ".github/workflows/deploy-daily-pages.yml"
      - "scripts/build_daily_pages.py"
      - "scripts/build_report_pages.py"
      - "index.html"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Build static site from daily + monthly markdown
        run: |
          pip install markdown
          python scripts/build_report_pages.py

      # Legacy Pages (branch main) serves committed HTML. Keep docs/ in sync.
      - name: Commit docs/ viewer if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs index.html .nojekyll
          if git diff --staged --quiet; then
            echo "No docs/ changes to commit"
          else
            git commit -m "pages: refresh daily/monthly output viewer"
            git push
          fi

      # When repo Pages source is "GitHub Actions", this path also deploys.
      - name: Set up Pages
        continue-on-error: true
        uses: actions/configure-pages@v6

      - name: Upload Pages artifact
        continue-on-error: true
        uses: actions/upload-pages-artifact@v5
        with:
          path: output/site

      - name: Deploy to GitHub Pages
        continue-on-error: true
        id: deployment
        uses: actions/deploy-pages@v5
