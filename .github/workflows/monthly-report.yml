name: Monthly Tech Market Report

on:
  schedule:
    # 08:30 KST = 23:30 UTC (after daily-monitor to avoid repo-push queue)
    - cron: '30 23 * * *'
  workflow_dispatch:
    inputs:
      year:
        description: 'Year (e.g. 2026). Leave blank for current month.'
        required: false
        default: ''
      month:
        description: 'Month number (e.g. 6). Leave blank for current month.'
        required: false
        default: ''

permissions:
  contents: write

concurrency:
  group: repo-push
  cancel-in-progress: false

jobs:
  monthly-report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Check if today is last business day (scheduled runs only)
        if: github.event_name == 'schedule'
        id: check_day
        env:
          TZ: Asia/Seoul
        run: |
          if python run_monthly_if_last_bizday.py --check-only; then
            echo "last_bizday=true" >> "$GITHUB_OUTPUT"
          else
            echo "last_bizday=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create monthly output directory
        if: github.event_name == 'workflow_dispatch' || steps.check_day.outputs.last_bizday == 'true'
        run: mkdir -p output/monthly

      - name: Run monthly report
        if: github.event_name == 'workflow_dispatch' || steps.check_day.outputs.last_bizday == 'true'
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
          MODEL_NAME: ${{ secrets.MODEL_NAME }}
          REPORTS_OUTPUT_DIR: output/monthly
          TZ: Asia/Seoul
        run: |
          if [ -n "${{ github.event.inputs.year }}" ] && [ -n "${{ github.event.inputs.month }}" ]; then
            python -m src.main monthly --year "${{ github.event.inputs.year }}" --month "${{ github.event.inputs.month }}" --no-cleanup
          else
            python -m src.main monthly --no-cleanup
          fi

      - name: List generated files
        if: github.event_name == 'workflow_dispatch' || steps.check_day.outputs.last_bizday == 'true'
        run: |
          echo "=== output/monthly ==="
          ls -la output/monthly/ || true

      - name: Commit monthly report to repo
        if: github.event_name == 'workflow_dispatch' || steps.check_day.outputs.last_bizday == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A output/monthly/*.md output/monthly/*.docx 2>/dev/null || true
          git add output/monthly/
          if git diff --staged --quiet; then
            echo "No report to commit."
            exit 0
          fi
          git commit -m "report: monthly $(date -u +%Y-%m)"
          git pull --rebase origin main
          git push origin HEAD:main
