name: Daily Tech Market Monitor

on:
  schedule:
    # 08:07 KST = 23:07 UTC (previous day). Off-hour minute: exact-hour crons
    # (especially 23:00/00:00 UTC) are heavily delayed on GitHub's shared queue.
    - cron: '7 23 * * *'
    # Backup run 10:37 KST in case the first schedule is delayed or dropped.
    # daily-catchup is idempotent, so a duplicate run is a no-op.
    - cron: '37 1 * * *'
  workflow_dispatch:
    inputs:
      date:
        description: 'Target date (YYYY-MM-DD). Leave blank for today.'
        required: false
        default: ''

permissions:
  contents: write

concurrency:
  group: repo-push
  cancel-in-progress: false

jobs:
  daily-monitor:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create required directories
        run: mkdir -p data output/daily output/monthly output/logs

      - name: Run daily monitor
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
          MODEL_NAME: ${{ secrets.MODEL_NAME }}
          TZ: Asia/Seoul
        run: |
          python -c "from src.daily_report import save_daily_report; print('import check: ok')"
          if [ -n "${{ github.event.inputs.date }}" ]; then
            python -m src.main daily --date "${{ github.event.inputs.date }}"
          else
            python -m src.main daily-catchup
          fi

      - name: List generated files
        run: |
          echo "=== output/daily ==="
          ls -la output/daily/ || true
          echo "=== data ==="
          ls -la data/ || true

      - name: Build GitHub Pages viewer (docs/)
        run: |
          pip install markdown
          python scripts/build_report_pages.py

      - name: Commit daily report, database, and Pages viewer
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A output/daily/*.md data/monitor.db data/daily_scheduler_state.json 2>/dev/null || true
          git add output/daily/ data/monitor.db data/daily_scheduler_state.json
          git add docs/ index.html .nojekyll
          if git diff --staged --quiet; then
            echo "No new report to commit."
            exit 0
          fi
          git commit -m "report: daily $(date -u +%Y-%m-%d)"
          git pull --rebase origin main
          git push origin HEAD:main
